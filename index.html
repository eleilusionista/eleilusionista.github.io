<!DOCTYPE html>
<html>
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <!-- Importamos la versión de AR.js sin NFT, pero con soporte para marcadores y ubicación -->
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <body style="margin: 0px; overflow: hidden;">
    <a-scene embedded arjs>
      <!-- Utilizamos gps-new-entity-place para posicionar la caja en una ubicación específica -->
      <a-box material="color: red" width="100" height="100" depth="100" gps-new-entity-place="latitude: -36.827958; longitude: -73.060079"></a-box>
      
      <!-- Mantenemos el marcador hiro para referencia visual -->
      <a-marker preset="hiro">
        <a-box position="0 0 0" width="0.5" height="0.5" depth="0.5" color="yellow"></a-box>
      </a-marker>
      
      <a-entity camera
        gps-camera-debug
        gps-camera-origin
        gps-camera-logger
        gps-camera-tracking></a-entity>
    </a-scene>
  </body>
</html>
